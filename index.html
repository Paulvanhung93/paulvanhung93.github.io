<script>
function b2u(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
var busy=false;
async function unlock(){
  if(busy)return; busy=true;
  var err=document.getElementById('err'), spin=document.getElementById('spin');
  var go=document.getElementById('go');
  err.textContent=''; spin.style.display='block'; go.disabled=true;
  try{
    var pw=document.getElementById('pw').value;
    var raw=b2u(document.getElementById('D').textContent.replace(/\s/g,''));
    var salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
    var enc=new TextEncoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
    var key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:salt,iterations:600000,hash:'SHA-256'},
      base,{name:'AES-GCM',length:256},false,['decrypt']);
    var dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    var html=pako.ungzip(new Uint8Array(dec),{to:'string'});
    document.open();document.write(html);document.close();
  }catch(e){
    spin.style.display='none'; go.disabled=false; busy=false;
    err.textContent='Incorrect password';
  }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
</script></body></html>
